services:
  db:
    image: pgvector/pgvector:pg16 
    container_name: my_law_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my_law
    ports:
      - "5432:5432"
    volumes:
      - my_law_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_law"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  my_law_pgdata:
